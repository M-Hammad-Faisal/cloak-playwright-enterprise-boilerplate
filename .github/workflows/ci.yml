name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Cache Cloak Browser Binary
        uses: actions/cache@v4
        with:
          path: ~/.cloakbrowser
          key: ${{ runner.os }}-cloakbrowser-${{ hashFiles('package-lock.json') }}

      - name: Install System Dependencies
        run: npx playwright install-deps chromium

      - name: Format Check
        run: npm run format -- --check

      - name: Lint Check
        run: npm run lint

      - name: Type Check (TSC)
        run: npm run compile

      - name: Build Verification (Clean Build)
        run: npm run build
        env:
          HEADLESS: true
          BASE_URL: https://www.saucedemo.com
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME || 'standard_user' }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD || 'secret_sauce' }}
